name: Build wheels and publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_BUILD_VERBOSITY: 1

          CIBW_BEFORE_ALL_LINUX: "yum install -y eigen3-devel curl tar && curl -L -o /tmp/boost.tar.gz https://github.com/boostorg/boost/releases/download/boost-1.91.0-1/boost-1.91.0-1-cmake.tar.gz && mkdir -p /tmp/boost && tar -xzf /tmp/boost.tar.gz -C /tmp/boost --strip-components=1"

          CIBW_BEFORE_ALL_MACOS: "brew install eigen && curl -L -o /tmp/boost.tar.gz https://github.com/boostorg/boost/releases/download/boost-1.91.0-1/boost-1.91.0-1-cmake.tar.gz && mkdir -p /Users/runner/boost && tar -xzf /tmp/boost.tar.gz -C /Users/runner/boost --strip-components=1"

          CIBW_BEFORE_ALL_WINDOWS: "curl -L -o boost.tar.gz https://github.com/boostorg/boost/releases/download/boost-1.91.0-1/boost-1.91.0-1-cmake.tar.gz && tar -xzf boost.tar.gz -C C:\\ && curl -L -o eigen.tar.gz https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz && tar -xzf eigen.tar.gz -C C:\\"
          CIBW_ENVIRONMENT_LINUX: "CMAKE_PREFIX_PATH=/tmp/boost"
          CIBW_ENVIRONMENT_MACOS: "CMAKE_PREFIX_PATH=/Users/runner/boost"
          CIBW_ENVIRONMENT_WINDOWS: "BOOST_ROOT=C:/boost-1.91.0-1-cmake Eigen3_ROOT=C:/eigen-3.4.0 CMAKE_PREFIX_PATH=C:/boost-1.91.0-1-cmake;C:/eigen-3.4.0"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Build sdist
        run: pipx run build --sdist --outdir dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}