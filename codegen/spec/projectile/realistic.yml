id: PROJ-R
class_name: realistic
nb_class_name: RealisticProjectile
description: A realistic projectile model with physical and aerodynamic properties.

properties:
  - name: mass
    type: scalar
    category: constant
    description: Total mass of the projectile. [kg]

  - name: diameter
    type: scalar
    category: constant
    description: Reference diameter of the projectile. [m]

  - name: reference_area
    type: scalar
    category: constant
    description: Aerodynamic reference cross-sectional area. [m²]

  - name: axial_moment_of_inertia
    type: scalar
    category: constant
    description: Moment of inertia about the spin axis. [kg·m²]

  - name: drag_force_coefficient
    type: scalar
    category: curve
    description: Aerodynamic drag force coefficient as a function of Mach number.

  - name: lift_force_coefficient
    type: scalar
    category: curve
    description: Aerodynamic lift force coefficient as a function of angle of attack.

  - name: overturning_moment_coefficient
    type: scalar
    category: curve
    description: Aerodynamic overturning moment coefficient as a function of angle of attack.

  - name: spin_damping_moment_coefficient
    type: scalar
    category: curve
    description: Moment coefficient damping spin about the axial axis.

  - name: magnus_force_coefficient
    type: scalar
    category: curve
    description: Magnus force coefficient due to spin-induced lateral force.
