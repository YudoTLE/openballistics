name: Build wheels and publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_BUILD_VERBOSITY: 1

          CIBW_BEFORE_ALL_LINUX: "yum install -y wget && wget https://boostorg.jfrog.io/artifactory/main/release/1.84.0/source/boost_1_84_0.tar.gz && tar -xzf boost_1_84_0.tar.gz -C /opt && curl -L -o eigen.tar.gz https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz && tar -xzf eigen.tar.gz -C /opt"
          CIBW_ENVIRONMENT_LINUX: "BOOST_ROOT=/opt/boost_1_84_0 Eigen3_ROOT=/opt/eigen-3.4.0 CMAKE_PREFIX_PATH=/opt/eigen-3.4.0"

          CIBW_BEFORE_ALL_MACOS: "brew install boost@1.84 && curl -L -o eigen.tar.gz https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz && tar -xzf eigen.tar.gz -C /tmp"
          CIBW_ENVIRONMENT_MACOS: "BOOST_ROOT=/usr/local/opt/boost@1.84 Eigen3_ROOT=/tmp/eigen-3.4.0 CMAKE_PREFIX_PATH=/tmp/eigen-3.4.0"

          CIBW_BEFORE_ALL_WINDOWS: "choco install boost-msvc-14.3 --version=1.84.0 --no-progress && curl -L -o eigen.tar.gz https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz && tar -xzf eigen.tar.gz -C C:\\"
          CIBW_ENVIRONMENT_WINDOWS: "BOOST_ROOT=C:/local/boost_1_84_0 Eigen3_ROOT=C:/eigen-3.4.0 CMAKE_PREFIX_PATH=C:/eigen-3.4.0"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Build sdist
        run: pipx run build --sdist --outdir dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
